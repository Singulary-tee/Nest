stages:
  - build

variables:
  ANDROID_COMPILE_SDK: "35"
  ANDROID_BUILD_TOOLS: "35.0.0"
  ANDROID_NDK_VERSION: "27.2.12479018"
  CARGO_TERM_COLOR: always
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"

.cache_template: &cache_template
  cache:
    - key: rust-$CI_COMMIT_REF_SLUG
      paths:
        - .cargo/
        - zeroclaw-android/target/
    - key: gradle-$CI_COMMIT_REF_SLUG
      paths:
        - .gradle/
        - build/
        - app/build/

build-debug-apk:
  stage: build
  image: ubuntu:22.04
  <<: *cache_template
  timeout: 60 minutes

  before_script:
    - export DEBIAN_FRONTEND=noninteractive

    # ── System dependencies ──────────────────────────────────────────────────
    - apt-get update -qq
    - apt-get install -y -qq curl wget unzip git ca-certificates gnupg openjdk-17-jdk

    # ── Java 17 ─────────────────────────────────────────────────────────────
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    - export PATH=$JAVA_HOME/bin:$PATH
    - java -version

    # ── Android SDK (install to home dir — no permission issues) ─────────────
    - export ANDROID_HOME=$HOME/android-sdk
    - export ANDROID_SDK_ROOT=$HOME/android-sdk
    - mkdir -p $ANDROID_HOME/cmdline-tools
    - wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
    - unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-extract
    - mv /tmp/cmdline-tools-extract/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
    - rm -rf /tmp/cmdline-tools.zip /tmp/cmdline-tools-extract
    - export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

    # Write licenses directly — avoids yes pipe failures
    - mkdir -p $ANDROID_HOME/licenses
    - printf '8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee' > $ANDROID_HOME/licenses/android-sdk-license
    - printf '84831b9409646a918e30573bab4c9c91346d8abd\nd975f751698a77b662f1254ddbeed3901e976f5a' > $ANDROID_HOME/licenses/android-sdk-preview-license

    # Install SDK components
    - sdkmanager "platform-tools" "platforms;android-${ANDROID_COMPILE_SDK}" "build-tools;${ANDROID_BUILD_TOOLS}" "ndk;${ANDROID_NDK_VERSION}"
    - export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION

    # ── Rust ─────────────────────────────────────────────────────────────────
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    - source "$HOME/.cargo/env"
    - export PATH=$HOME/.cargo/bin:$PATH
    - rustup target add aarch64-linux-android x86_64-linux-android
    - cargo install cargo-ndk --locked
    - rustc --version
    - cargo --version

    # ── Submodules ───────────────────────────────────────────────────────────
    - git submodule update --init --recursive

    # ── Apply patches ────────────────────────────────────────────────────────
    - if ls patches/*.patch 1>/dev/null 2>&1; then cd zeroclaw && git apply ../patches/*.patch; cd ..; fi

    # ── Web UI placeholder ───────────────────────────────────────────────────
    - mkdir -p zeroclaw/web/dist
    - |
      if [ ! -f zeroclaw/web/dist/index.html ]; then
        printf '%s\n' '<!doctype html><html><body>PhoneClaw</body></html>' > zeroclaw/web/dist/index.html
      fi

    # ── Gradle permissions ───────────────────────────────────────────────────
    - chmod +x ./gradlew

  script:
    - ./gradlew :app:assembleDebug

  artifacts:
    name: "phoneclaw-debug-$CI_COMMIT_SHORT_SHA"
    paths:
      - app/build/outputs/apk/debug/phoneclaw.apk
    expire_in: 7 days
    when: on_success

  only:
    - main
    - merge_requests
